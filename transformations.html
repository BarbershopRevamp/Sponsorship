<style>
body {
  margin:0;
  font-family:Poppins;
  background:#0b0b0b;
  color:white;
}

nav {
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#000;
}

nav a {
  color:white;
  margin-left:20px;
  text-decoration:none;
}

h1 {
  text-align:center;
  margin:50px 0;
}

.container {
  padding:0 50px 50px;
}

.row {
  display:flex;
  gap:20px;

.box img {

.label {

<h1>Before / After Transformations</h1>

<div class="container">

  <div class="row">
    <div class="box">
      <img src="https://images.unsplash.com/photo-1605497787865-e6cfb8c4b68d">
      <div class="label before">Before</div>
    </div>
    <div class="box">
      <img src="https://images.unsplash.com/photo-1585747860715-2ba37e788b70">
      <div class="label after">After</div>

  </div>

  <div class="row">
    <div class="box">

    </div>
    <div class="box">
      <img src="https://images.unsplash.com/photo-1616627988259-48a8c59c7d5c">
      <div class="label after">After</div>
    </div>
  </div>

</div>
